name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'

permissions:
  id-token: write
  contents: write

jobs:
  test:
    runs-on: github-gpu
    env:
      MODULAR_NVPTX_COMPILER_PATH: /home/runner/work/mojo-gpu-puzzles/mojo-gpu-puzzles/.pixi/envs/default/bin/ptxas
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.modular
            ~/.cache/modular
          key: ${{ runner.os }}-modular-${{ hashFiles('**/pixi.toml') }}

      - uses: prefix-dev/setup-pixi@fef5c9568ca6c4ff7707bf840ab0692ba3f08293
        with:
          pixi-version: v0.53.0
          cache: false
          post-cleanup: false

      - name: Check formatting
        shell: bash
        run: |
          pixi run format-check

      - name: Check book references
        shell: bash
        run: |
          pixi run check-book-refs

      - name: Check problem skeletons are in sync with solutions
        shell: bash
        run: |
          pixi run check-skeletons

      - name: Compile problem skeletons
        shell: bash
        run: |
          pixi run compile-problems

      - name: Tests
        shell: bash
        run: |
          pixi run tests
